  <text x="58" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="900" fill="#f5f3ef">Amir<tspan fill="url(#accent)">Geek</tspan></text>

  <text x="60" y="222" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="14" fill="#c7c4bd">root@amirgeek:~$ building intelligent software &amp; secure infrastructure_</text>

